<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Practice Tracker</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0C0D10">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Practice">
    <link rel="apple-touch-icon" href="icon.svg">
    <style>
        :root {
            --bg:     #0C0D10;
            --s1:     #15171C;
            --s2:     #1D1F28;
            --border: rgba(255,255,255,0.07);
            --text:   #F0F1F5;
            --muted:  #8B8FA8;
            --faint:  #3D4058;

            --piano:   #7B8CDE;
            --marimba: #E8A838;
            --drumset: #E05C7A;
            --snare:   #3EC4C4;

            --r:    16px;
            --r-sm: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100dvh;
            max-width: 480px;
            margin: 0 auto;
            overflow-x: hidden;
        }

        /* ── Pages ─────────────────────────────── */
        .page { display: none; padding: 0 20px 100px; }
        .page.active { display: block; }

        .page-header { padding: max(20px, env(safe-area-inset-top)) 0 20px; }
        .page-title  { font-size: 1.75rem; font-weight: 700; letter-spacing: -0.5px; }
        .page-sub    { font-size: 0.8rem; color: var(--muted); margin-top: 3px; min-height: 1.2em; }

        /* ── Bottom Nav ─────────────────────────── */
        .nav {
            position: fixed;
            bottom: 0; left: 50%;
            transform: translateX(-50%);
            width: 100%; max-width: 480px;
            background: rgba(12, 13, 16, 0.85);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-top: 1px solid var(--border);
            display: flex;
            padding: 10px 0 max(12px, env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            flex: 1; display: flex; flex-direction: column;
            align-items: center; gap: 4px;
            cursor: pointer; user-select: none;
            transition: transform 0.12s;
        }
        .nav-item:active { transform: scale(0.88); }

        .nav-icon  { width: 22px; height: 22px; opacity: 0.35; transition: opacity 0.2s; color: var(--text); }
        .nav-icon svg { width: 100%; height: 100%; }
        .nav-label { font-size: 0.63rem; font-weight: 600; letter-spacing: 0.3px; opacity: 0.35; transition: opacity 0.2s; }
        .nav-item.active .nav-icon,
        .nav-item.active .nav-label { opacity: 1; }

        /* ── Section label ──────────────────────── */
        .section-label {
            font-size: 0.68rem; font-weight: 600;
            letter-spacing: 0.7px; text-transform: uppercase;
            color: var(--muted); margin-bottom: 10px;
        }

        /* ── Instrument Grid ────────────────────── */
        .instruments {
            display: grid; grid-template-columns: 1fr 1fr;
            gap: 10px; margin-bottom: 28px;
        }

        .inst-btn {
            position: relative;
            padding: 16px 14px;
            border-radius: var(--r);
            border: 1.5px solid var(--border);
            background: var(--s1);
            color: var(--muted);
            cursor: pointer; text-align: left; overflow: hidden;
            transition: border-color 0.18s, color 0.18s, transform 0.1s;
        }
        .inst-btn:active   { transform: scale(0.96); }
        .inst-btn:disabled { opacity: 0.35; cursor: not-allowed; }

        .inst-btn::before {
            content: ''; position: absolute; inset: 0;
            border-radius: inherit; opacity: 0;
            transition: opacity 0.22s;
        }
        .inst-btn[data-id="piano"]::before   { background: radial-gradient(circle at 25% 25%, rgba(123,140,222,0.25), transparent 65%); }
        .inst-btn[data-id="marimba"]::before { background: radial-gradient(circle at 25% 25%, rgba(232,168,56, 0.25), transparent 65%); }
        .inst-btn[data-id="drumset"]::before { background: radial-gradient(circle at 25% 25%, rgba(224,92,122, 0.25), transparent 65%); }
        .inst-btn[data-id="snare"]::before   { background: radial-gradient(circle at 25% 25%, rgba(62,196,196, 0.25), transparent 65%); }

        .inst-btn.selected::before { opacity: 1; }
        .inst-btn[data-id="piano"].selected   { border-color: var(--piano);   color: var(--piano);   }
        .inst-btn[data-id="marimba"].selected { border-color: var(--marimba); color: var(--marimba); }
        .inst-btn[data-id="drumset"].selected { border-color: var(--drumset); color: var(--drumset); }
        .inst-btn[data-id="snare"].selected   { border-color: var(--snare);   color: var(--snare);   }

        .inst-icon { width: 38px; height: 38px; display: block; margin-bottom: 10px; position: relative; }
        .inst-icon svg { width: 100%; height: 100%; }
        .inst-name { font-size: 0.82rem; font-weight: 600; display: block; position: relative; color: var(--text); }

        /* ── Timer ──────────────────────────────── */
        .timer-wrap { display: flex; justify-content: center; padding: 4px 0 24px; }

        .timer-ring-wrap { position: relative; width: 210px; height: 210px; }

        .timer-ring { width: 210px; height: 210px; transform: rotate(-90deg); }
        .ring-track { fill: none; stroke: var(--s2); stroke-width: 5; }
        .ring-fill  {
            fill: none; stroke-width: 5; stroke-linecap: round;
            stroke-dasharray: 565.5; stroke-dashoffset: 565.5;
            stroke: var(--piano);
            transition: stroke-dashoffset 0.4s linear, stroke 0.3s;
        }

        .timer-inner {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center; gap: 6px;
        }

        .timer-digits {
            font-size: 2.5rem; font-weight: 700;
            font-variant-numeric: tabular-nums;
            letter-spacing: -1.5px; line-height: 1;
            color: var(--text); transition: color 0.3s;
        }

        .timer-status { font-size: 0.7rem; color: var(--muted); text-align: center; }

        .rec-dot {
            display: inline-block; width: 6px; height: 6px;
            border-radius: 50%; margin-right: 4px; vertical-align: middle;
            animation: blink 1.1s ease-in-out infinite;
        }

        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }

        /* ── Buttons ────────────────────────────── */
        .btn {
            width: 100%; padding: 15px;
            border-radius: var(--r); border: none;
            font-size: 0.95rem; font-weight: 600;
            cursor: pointer; letter-spacing: 0.1px;
            transition: transform 0.1s, opacity 0.15s;
        }
        .btn:active   { transform: scale(0.97); }
        .btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .btn-primary { background: var(--piano); color: #fff; }
        .btn-save    { background: rgba(62,196,196,0.1); color: var(--snare); border: 1px solid rgba(62,196,196,0.18); margin-top: 10px; }
        .btn-discard { background: rgba(224,92,122,0.08); color: var(--drumset); border: 1px solid rgba(224,92,122,0.14); margin-top: 8px; }

        /* ── Note input ─────────────────────────── */
        .note-input {
            width: 100%; padding: 13px 15px;
            border-radius: var(--r); border: 1px solid var(--border);
            background: var(--s1); color: var(--text);
            font-size: 0.88rem; font-family: inherit;
            margin-top: 12px; resize: none; transition: border-color 0.2s;
        }
        .note-input:focus        { outline: none; border-color: rgba(123,140,222,0.45); }
        .note-input::placeholder { color: var(--faint); }

        /* ── Log ────────────────────────────────── */
        .date-label {
            font-size: 0.68rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.7px;
            color: var(--muted); margin: 20px 0 8px;
        }
        .date-label:first-child { margin-top: 0; }

        .session-list { display: flex; flex-direction: column; gap: 7px; }

        .session-card {
            background: var(--s1); border-radius: var(--r-sm);
            padding: 12px 14px; display: flex; align-items: center;
            gap: 12px; border: 1px solid var(--border);
        }

        .session-bar { width: 3px; border-radius: 2px; align-self: stretch; min-height: 36px; flex-shrink: 0; }
        .session-sicon { width: 20px; height: 20px; flex-shrink: 0; }
        .session-sicon svg { width: 100%; height: 100%; }
        .session-info  { flex: 1; min-width: 0; }
        .session-name  { font-size: 0.86rem; font-weight: 600; }
        .session-time  { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }
        .session-note  { font-size: 0.7rem; color: var(--muted); margin-top: 2px; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .session-dur   { font-size: 0.9rem; font-weight: 700; font-variant-numeric: tabular-nums; flex-shrink: 0; }
        .session-del   { background: none; border: none; color: var(--faint); cursor: pointer; font-size: 0.8rem; padding: 4px; flex-shrink: 0; transition: color 0.15s; }
        .session-del:hover { color: var(--drumset); }

        .empty-state   { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 45vh; color: var(--muted); text-align: center; gap: 14px; }
        .empty-icon    { width: 52px; height: 52px; opacity: 0.35; }
        .empty-icon svg { width: 100%; height: 100%; }
        .empty-text    { font-size: 0.86rem; line-height: 1.65; }

        /* ── Stats ──────────────────────────────── */
        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }

        .stat-chip { background: var(--s1); border-radius: var(--r); padding: 16px; border: 1px solid var(--border); }
        .stat-val  { font-size: 1.8rem; font-weight: 700; font-variant-numeric: tabular-nums; letter-spacing: -0.5px; line-height: 1; }
        .stat-lbl  { font-size: 0.69rem; color: var(--muted); margin-top: 6px; font-weight: 500; }

        .stat-section { background: var(--s1); border-radius: var(--r); padding: 16px; border: 1px solid var(--border); margin-bottom: 10px; }
        .stat-section-title { font-size: 0.68rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-bottom: 16px; }

        .irow { display: flex; align-items: center; gap: 11px; margin-bottom: 14px; }
        .irow:last-child { margin-bottom: 0; }
        .irow-icon { width: 18px; height: 18px; flex-shrink: 0; }
        .irow-icon svg { width: 100%; height: 100%; }
        .irow-body { flex: 1; min-width: 0; }
        .irow-top  { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 5px; }
        .irow-name { font-size: 0.8rem; font-weight: 500; color: var(--text); }
        .irow-dur  { font-size: 0.8rem; font-weight: 700; font-variant-numeric: tabular-nums; }

        .bar-track { height: 5px; background: var(--s2); border-radius: 3px; overflow: hidden; }
        .bar-fill  { height: 100%; border-radius: 3px; transition: width 0.55s cubic-bezier(0.34,1.4,0.64,1); }
    </style>
</head>
<body>

<!-- ── TIMER ─────────────────────────────────────── -->
<div id="page-timer" class="page active">
    <div class="page-header">
        <div class="page-title">Practice</div>
        <div class="page-sub" id="page-sub">Ready to start</div>
    </div>

    <div class="section-label">Instrument</div>
    <div class="instruments">
        <button class="inst-btn" data-id="piano"   onclick="selectInst('piano')">
            <span class="inst-icon" id="card-icon-piano"></span>
            <span class="inst-name">Piano</span>
        </button>
        <button class="inst-btn" data-id="marimba" onclick="selectInst('marimba')">
            <span class="inst-icon" id="card-icon-marimba"></span>
            <span class="inst-name">Marimba</span>
        </button>
        <button class="inst-btn" data-id="drumset" onclick="selectInst('drumset')">
            <span class="inst-icon" id="card-icon-drumset"></span>
            <span class="inst-name">Drumset</span>
        </button>
        <button class="inst-btn" data-id="snare"   onclick="selectInst('snare')">
            <span class="inst-icon" id="card-icon-snare"></span>
            <span class="inst-name">Marching Snare</span>
        </button>
    </div>

    <div class="timer-wrap">
        <div class="timer-ring-wrap">
            <svg class="timer-ring" viewBox="0 0 200 200">
                <circle class="ring-track" cx="100" cy="100" r="90"/>
                <circle class="ring-fill"  cx="100" cy="100" r="90" id="ring-fill"/>
            </svg>
            <div class="timer-inner">
                <div class="timer-digits" id="timer-disp">00:00:00</div>
                <div class="timer-status" id="timer-status">Select an instrument</div>
            </div>
        </div>
    </div>

    <button class="btn btn-primary" id="main-btn" onclick="toggleTimer()" disabled>Start</button>

    <div id="save-area" style="display:none">
        <textarea class="note-input" id="note-input" rows="2"
            placeholder="Optional note — e.g. Bach Invention No. 1, hands separate"></textarea>
        <button class="btn btn-save"    onclick="saveSession()">Save Session</button>
        <button class="btn btn-discard" onclick="discardSession()">Discard</button>
    </div>
</div>

<!-- ── LOG ───────────────────────────────────────── -->
<div id="page-log" class="page">
    <div class="page-header">
        <div class="page-title">Log</div>
        <div class="page-sub">Your session history</div>
    </div>
    <div id="log-container"></div>
</div>

<!-- ── STATS ─────────────────────────────────────── -->
<div id="page-stats" class="page">
    <div class="page-header">
        <div class="page-title">Stats</div>
        <div class="page-sub">Your practice overview</div>
    </div>

    <div class="stat-grid">
        <div class="stat-chip">
            <div class="stat-val" id="s-sessions">0</div>
            <div class="stat-lbl">Total Sessions</div>
        </div>
        <div class="stat-chip">
            <div class="stat-val" id="s-streak" style="color:var(--marimba)">0</div>
            <div class="stat-lbl">Day Streak</div>
        </div>
        <div class="stat-chip">
            <div class="stat-val" id="s-week" style="color:var(--snare)">0m</div>
            <div class="stat-lbl">This Week</div>
        </div>
        <div class="stat-chip">
            <div class="stat-val" id="s-total" style="color:var(--piano)">0h</div>
            <div class="stat-lbl">All Time</div>
        </div>
    </div>

    <div class="stat-section">
        <div class="stat-section-title">All Time by Instrument</div>
        <div id="bars-all"></div>
    </div>
    <div class="stat-section">
        <div class="stat-section-title">This Week</div>
        <div id="bars-week"></div>
    </div>
</div>

<!-- ── BOTTOM NAV ────────────────────────────────── -->
<nav class="nav">
    <div class="nav-item active" data-page="timer" onclick="showPage('timer')">
        <div class="nav-icon" id="nav-icon-timer"></div>
        <div class="nav-label">Timer</div>
    </div>
    <div class="nav-item" data-page="log" onclick="showPage('log')">
        <div class="nav-icon" id="nav-icon-log"></div>
        <div class="nav-label">Log</div>
    </div>
    <div class="nav-item" data-page="stats" onclick="showPage('stats')">
        <div class="nav-icon" id="nav-icon-stats"></div>
        <div class="nav-label">Stats</div>
    </div>
</nav>

<script>
/* ── SVG icon library ──────────────────────────────────────────────── */
const SVG = {
    piano: `<svg viewBox="0 0 36 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1" y="4" width="34" height="24" rx="2"/>
        <line x1="5.9"  y1="4" x2="5.9"  y2="28"/>
        <line x1="10.7" y1="4" x2="10.7" y2="28"/>
        <line x1="15.6" y1="4" x2="15.6" y2="28"/>
        <line x1="20.4" y1="4" x2="20.4" y2="28"/>
        <line x1="25.3" y1="4" x2="25.3" y2="28"/>
        <line x1="30.1" y1="4" x2="30.1" y2="28"/>
        <rect x="4.4"  y="4" width="3" height="13" rx="1" fill="currentColor" stroke="none"/>
        <rect x="9.2"  y="4" width="3" height="13" rx="1" fill="currentColor" stroke="none"/>
        <rect x="18.9" y="4" width="3" height="13" rx="1" fill="currentColor" stroke="none"/>
        <rect x="23.8" y="4" width="3" height="13" rx="1" fill="currentColor" stroke="none"/>
        <rect x="28.6" y="4" width="3" height="13" rx="1" fill="currentColor" stroke="none"/>
    </svg>`,

    marimba: `<svg viewBox="0 0 36 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <rect x="1"    y="12" width="7" height="18" rx="1.5"/>
        <rect x="10"   y="12" width="7" height="18" rx="1.5"/>
        <rect x="19"   y="12" width="7" height="18" rx="1.5"/>
        <rect x="28"   y="12" width="7" height="18" rx="1.5"/>
        <rect x="6.5"  y="2"  width="5" height="13" rx="1" fill="currentColor" stroke="none"/>
        <rect x="15.5" y="2"  width="5" height="13" rx="1" fill="currentColor" stroke="none"/>
        <rect x="24.5" y="2"  width="5" height="13" rx="1" fill="currentColor" stroke="none"/>
    </svg>`,

    drumset: `<svg viewBox="0 0 36 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <line x1="7" y1="12" x2="7" y2="28"/>
        <ellipse cx="7" cy="8.5"  rx="5.5" ry="1.8"/>
        <ellipse cx="7" cy="11.5" rx="5.5" ry="1.8"/>
        <ellipse cx="19" cy="10.5" rx="4.5" ry="1.8"/>
        <line x1="14.5" y1="10.5" x2="14.5" y2="15"/>
        <line x1="23.5" y1="10.5" x2="23.5" y2="15"/>
        <circle cx="23" cy="23" r="8.5"/>
        <ellipse cx="30" cy="6" rx="5.5" ry="1.8" transform="rotate(-12 30 6)"/>
    </svg>`,

    snare: `<svg viewBox="0 0 36 32" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="18" cy="16" r="11"/>
        <line x1="18"   y1="5"    x2="18"   y2="2.5"/>
        <line x1="25.8" y1="8.2"  x2="27.6" y2="6.4"/>
        <line x1="29"   y1="16"   x2="31.5" y2="16"/>
        <line x1="25.8" y1="23.8" x2="27.6" y2="25.6"/>
        <line x1="18"   y1="27"   x2="18"   y2="29.5"/>
        <line x1="10.2" y1="23.8" x2="8.4"  y2="25.6"/>
        <line x1="7"    y1="16"   x2="4.5"  y2="16"/>
        <line x1="10.2" y1="8.2"  x2="8.4"  y2="6.4"/>
    </svg>`,

    timer: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <line x1="10" y1="2" x2="14" y2="2"/>
        <line x1="12" y1="2" x2="12" y2="5"/>
        <circle cx="12" cy="13" r="8"/>
        <polyline points="12 9 12 13 15 15"/>
        <line x1="6.5"  y1="5.5" x2="8"  y2="7"/>
        <line x1="17.5" y1="5.5" x2="16" y2="7"/>
    </svg>`,

    log: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="2" width="16" height="20" rx="2.5"/>
        <line x1="8" y1="8"  x2="16" y2="8"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
        <line x1="8" y1="16" x2="13" y2="16"/>
    </svg>`,

    stats: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="21" x2="21" y2="21"/>
        <rect x="5"  y="12" width="4" height="9" rx="1"/>
        <rect x="10" y="6"  width="4" height="15" rx="1"/>
        <rect x="15" y="9"  width="4" height="12" rx="1"/>
    </svg>`,

    musicNote: `<svg viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 36V13l22-4v23"/>
        <circle cx="16" cy="36" r="4"/>
        <circle cx="38" cy="32" r="4"/>
    </svg>`,
};

/* ── Data ──────────────────────────────────────────────────────────── */
const INST = {
    piano:   { name: 'Piano',          color: '#7B8CDE', icon: SVG.piano   },
    marimba: { name: 'Marimba',        color: '#E8A838', icon: SVG.marimba },
    drumset: { name: 'Drumset',        color: '#E05C7A', icon: SVG.drumset },
    snare:   { name: 'Marching Snare', color: '#3EC4C4', icon: SVG.snare   },
};

const CIRC = 2 * Math.PI * 90;

const store = {
    get()  { return JSON.parse(localStorage.getItem('pt_sessions') || '[]'); },
    set(s) { localStorage.setItem('pt_sessions', JSON.stringify(s)); },
};

/* ── Inject icons on load ──────────────────────────────────────────── */
Object.entries(INST).forEach(([id, i]) => {
    const el = document.getElementById('card-icon-' + id);
    if (el) el.innerHTML = i.icon;
});
document.getElementById('nav-icon-timer').innerHTML = SVG.timer;
document.getElementById('nav-icon-log').innerHTML   = SVG.log;
document.getElementById('nav-icon-stats').innerHTML = SVG.stats;

/* ── Timer state ───────────────────────────────────────────────────── */
let running = false, selected = null, startTs = null, elapsed = 0, ticker = null;

function selectInst(id) {
    if (running) return;
    selected = id;
    document.querySelectorAll('.inst-btn').forEach(b => b.classList.remove('selected'));
    document.querySelector(`[data-id="${id}"]`).classList.add('selected');
    const btn = document.getElementById('main-btn');
    btn.disabled = false;
    btn.style.background = INST[id].color;
    document.getElementById('ring-fill').style.stroke = INST[id].color;
    document.getElementById('timer-status').textContent = INST[id].name + ' — ready';
    document.getElementById('page-sub').textContent = INST[id].name + ' selected';
}

function toggleTimer() {
    if (!running) {
        if (!selected) return;
        running = true;
        startTs = Date.now() - elapsed;
        ticker = setInterval(tick, 100);
        const btn = document.getElementById('main-btn');
        btn.textContent = 'Stop';
        btn.style.background = '#E05C7A';
        document.getElementById('timer-status').innerHTML =
            `<span class="rec-dot" style="background:${INST[selected].color}"></span>Recording`;
        document.getElementById('page-sub').textContent = '● Live session';
        document.querySelectorAll('.inst-btn').forEach(b => b.disabled = true);
        document.getElementById('save-area').style.display = 'none';
    } else {
        running = false;
        clearInterval(ticker);
        document.getElementById('main-btn').style.display = 'none';
        document.getElementById('timer-status').textContent = 'Stopped — save or discard';
        document.getElementById('save-area').style.display = 'block';
        document.getElementById('page-sub').textContent = 'Session ready to save';
    }
}

function tick() {
    elapsed = Date.now() - startTs;
    const secs = Math.floor(elapsed / 1000);
    document.getElementById('timer-disp').textContent = fmt(secs);
    document.getElementById('timer-disp').style.color = INST[selected].color;
    const progress = (secs % 1800) / 1800;
    document.getElementById('ring-fill').style.strokeDashoffset = CIRC * (1 - progress);
}

function fmt(s) {
    return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60]
        .map(n => String(n).padStart(2,'0')).join(':');
}

function fmtDur(s) {
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    if (h) return `${h}h ${m}m`;
    if (m) return `${m}m ${sec}s`;
    return `${sec}s`;
}

function saveSession() {
    const dur = Math.floor(elapsed / 1000);
    if (dur < 5) { alert('Session too short to save.'); return; }
    const ss = store.get();
    ss.unshift({ id: Date.now(), instrument: selected, duration: dur,
        note: document.getElementById('note-input').value.trim(),
        date: new Date().toISOString() });
    store.set(ss);
    reset();
    showPage('log');
}

function discardSession() {
    if (confirm('Discard this session?')) reset();
}

function reset() {
    running = false; elapsed = 0; selected = null;
    clearInterval(ticker);
    document.getElementById('timer-disp').textContent = '00:00:00';
    document.getElementById('timer-disp').style.color = '';
    document.getElementById('timer-status').textContent = 'Select an instrument';
    document.getElementById('page-sub').textContent = 'Ready to start';
    document.getElementById('ring-fill').style.strokeDashoffset = CIRC;
    document.getElementById('ring-fill').style.stroke = 'var(--piano)';
    const btn = document.getElementById('main-btn');
    btn.textContent = 'Start'; btn.style.background = '';
    btn.style.display = ''; btn.className = 'btn btn-primary'; btn.disabled = true;
    document.getElementById('save-area').style.display = 'none';
    document.getElementById('note-input').value = '';
    document.querySelectorAll('.inst-btn').forEach(b => { b.disabled = false; b.classList.remove('selected'); });
}

function deleteSession(id) {
    if (!confirm('Delete this session?')) return;
    store.set(store.get().filter(s => s.id !== id));
    renderLog(); renderStats();
}

/* ── Render Log ────────────────────────────────────────────────────── */
function renderLog() {
    const sessions = store.get();
    const el = document.getElementById('log-container');
    if (!sessions.length) {
        el.innerHTML = `<div class="empty-state">
            <div class="empty-icon">${SVG.musicNote}</div>
            <div class="empty-text">No sessions yet.<br>Head to Timer and start practicing.</div>
        </div>`;
        return;
    }
    const groups = {};
    sessions.forEach(s => {
        const key = new Date(s.date).toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
        (groups[key] = groups[key] || []).push(s);
    });
    el.innerHTML = Object.entries(groups).map(([date, ss]) =>
        `<div class="date-label">${date}</div>
         <div class="session-list">${ss.map(s => {
            const i = INST[s.instrument];
            return `<div class="session-card">
                <div class="session-bar" style="background:${i.color}"></div>
                <div class="session-sicon" style="color:${i.color}">${i.icon}</div>
                <div class="session-info">
                    <div class="session-name">${i.name}</div>
                    <div class="session-time">${new Date(s.date).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})}</div>
                    ${s.note ? `<div class="session-note">${s.note}</div>` : ''}
                </div>
                <div class="session-dur" style="color:${i.color}">${fmtDur(s.duration)}</div>
                <button class="session-del" onclick="deleteSession(${s.id})">✕</button>
            </div>`;
        }).join('')}</div>`
    ).join('');
}

/* ── Render Stats ──────────────────────────────────────────────────── */
function renderStats() {
    const sessions = store.get();
    const now = new Date();
    const weekStart = new Date(now);
    weekStart.setHours(0,0,0,0);
    weekStart.setDate(now.getDate() - now.getDay());

    const all = {}, week = {};
    Object.keys(INST).forEach(k => { all[k] = 0; week[k] = 0; });
    let totalSec = 0, weekSec = 0;

    sessions.forEach(s => {
        all[s.instrument]  += s.duration; totalSec += s.duration;
        if (new Date(s.date) >= weekStart) { week[s.instrument] += s.duration; weekSec += s.duration; }
    });

    const days = new Set(sessions.map(s => new Date(s.date).toDateString()));
    let streak = 0;
    for (let i = 0; i < 365; i++) {
        const d = new Date(now); d.setDate(now.getDate() - i);
        if (days.has(d.toDateString())) streak++; else break;
    }

    document.getElementById('s-sessions').textContent = sessions.length;
    document.getElementById('s-streak').textContent   = streak;
    document.getElementById('s-week').textContent     = Math.round(weekSec / 60) + 'm';
    document.getElementById('s-total').textContent    = (totalSec / 3600).toFixed(1) + 'h';

    function bars(data, max) {
        return Object.entries(INST).map(([id, i]) => `
            <div class="irow">
                <div class="irow-icon" style="color:${i.color}">${i.icon}</div>
                <div class="irow-body">
                    <div class="irow-top">
                        <span class="irow-name">${i.name}</span>
                        <span class="irow-dur" style="color:${i.color}">${fmtDur(data[id])}</span>
                    </div>
                    <div class="bar-track">
                        <div class="bar-fill" style="width:${max ? (data[id]/max*100).toFixed(1) : 0}%;background:${i.color}"></div>
                    </div>
                </div>
            </div>`).join('');
    }

    document.getElementById('bars-all').innerHTML  = bars(all,  Math.max(...Object.values(all),  1));
    document.getElementById('bars-week').innerHTML = bars(week, Math.max(...Object.values(week), 1));
}

/* ── Navigation ────────────────────────────────────────────────────── */
function showPage(name) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('page-' + name).classList.add('active');
    document.querySelector(`[data-page="${name}"]`).classList.add('active');
    if (name === 'log')   renderLog();
    if (name === 'stats') renderStats();
}

if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
renderStats();
</script>
</body>
